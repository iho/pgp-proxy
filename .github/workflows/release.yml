name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (glibc) — most servers
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: pgp-proxy-linux-x86_64

          # Linux x86_64 (musl) — static binary, Alpine-compatible
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: pgp-proxy-linux-x86_64-musl

          # Linux ARM64 (Raspberry Pi 4, AWS Graviton, etc.)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: pgp-proxy-linux-aarch64

          # macOS Intel
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: pgp-proxy-macos-x86_64

          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: pgp-proxy-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # musl target needs musl-tools; aarch64 Linux needs a cross-compiler
      - name: Install cross-compilation tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu

      - name: Configure cross-linker for aarch64-linux
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/pgp-proxy"
          ARCHIVE="${{ matrix.artifact }}.tar.gz"
          tar czf "$ARCHIVE" -C "$(dirname $BIN)" "$(basename $BIN)"
          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Generate checksums
        run: |
          cd dist
          find . -name '*.tar.gz' -exec sha256sum {} \; | sed 's|./[^/]*/||' > sha256sums.txt
          cat sha256sums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: pgp-proxy ${{ github.ref_name }}
          body: |
            ## pgp-proxy ${{ github.ref_name }}

            Self-hosted PGP email proxy — no external MTA required.

            ### Downloads

            | Platform | Binary |
            |---|---|
            | Linux x86_64 (glibc) | `pgp-proxy-linux-x86_64.tar.gz` |
            | Linux x86_64 (musl/static) | `pgp-proxy-linux-x86_64-musl.tar.gz` |
            | Linux ARM64 | `pgp-proxy-linux-aarch64.tar.gz` |
            | macOS Intel | `pgp-proxy-macos-x86_64.tar.gz` |
            | macOS Apple Silicon | `pgp-proxy-macos-aarch64.tar.gz` |

            ### Install

            ```bash
            # Linux x86_64 example
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/pgp-proxy-linux-x86_64.tar.gz | tar xz
            chmod +x pgp-proxy
            ./pgp-proxy
            ```

            See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for setup instructions.
          files: |
            dist/**/*.tar.gz
            dist/sha256sums.txt
          fail_on_unmatched_files: true
